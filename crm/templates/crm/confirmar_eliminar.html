{% extends 'crm/base.html' %}

{% block content %}
<h2>¿Eliminar {{ tipo }}?</h2>
<p>¿Estás seguro de que deseas eliminar a "{{ objeto }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
